name: AI PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ai-review:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run AI review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_CODE_REVIEW_MODEL }}
          AI_REVIEW_MAX_DIFF_CHARS: ${{ vars.OPENAI_CODE_REVIEW_MAX_DIFF_CHARS }}
          AI_REVIEW_SKIP_DRAFTS: ${{ vars.OPENAI_CODE_REVIEW_SKIP_DRAFTS }}
        run: python3 scripts/ai_code_review.py
