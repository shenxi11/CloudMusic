openapi: 3.0.3
info:
  title: Music Platform Gateway API
  version: "2026-03-04"
  description: |
    Gateway API for the split architecture deployment.
    Base gateway: http://127.0.0.1:8080
    Verified with live tests on 2026-03-04.
servers:
  - url: http://127.0.0.1:8080
    description: Local gateway
  - url: http://slcdut.xyz:8080
    description: Public gateway

tags:
  - name: system
  - name: client
  - name: auth
  - name: presence
  - name: catalog
  - name: profile
  - name: playlist
  - name: recommendation
  - name: media
  - name: video
  - name: compatibility

paths:
  /health:
    get:
      tags: [system]
      summary: Gateway health check
      operationId: getHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /client/ping:
    get:
      tags: [client]
      summary: Lightweight connectivity check for client startup
      operationId: getClientPing
      responses:
        "200":
          description: Ping success envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeClientPing"

  /client/bootstrap:
    get:
      tags: [client]
      summary: Client bootstrap info and service readiness
      operationId: getClientBootstrap
      responses:
        "200":
          description: Bootstrap success envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeClientBootstrap"

  /users/register:
    post:
      tags: [auth]
      summary: Register user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              account: demo_account
              password: demo_password
              username: demo_user
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeSuccessBool"
              example:
                code: 0
                message: success
                data:
                  success: true
        "409":
          description: Account already exists
          content:
            text/plain:
              schema:
                type: string
              example: this account already exists
        "400":
          $ref: "#/components/responses/ErrorEnvelope"

  /users/login:
    post:
      tags: [auth]
      summary: Login user
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              account: demo_account
              password: demo_password
      responses:
        "200":
          description: Login response (success or fail)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /users/ping:
    post:
      tags: [presence]
      summary: Legacy online ping (compat, no session token check)
      operationId: pingUserLegacy
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPingRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeSuccessBool"

  /users/profile:
    get:
      tags: [auth]
      summary: Get current user profile
      operationId: getUserProfile
      parameters:
        - in: query
          name: account
          required: true
          schema:
            type: string
        - in: query
          name: session_token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeUserProfile"
        "401":
          $ref: "#/components/responses/ErrorEnvelope"

  /users/profile/username:
    post:
      tags: [auth]
      summary: Update current username
      operationId: updateUsername
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUsernameRequest"
            example:
              account: demo_account
              session_token: demo_session_token
              username: 新用户名
      responses:
        "200":
          description: Username updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeUpdateUsernameResponse"
        "401":
          $ref: "#/components/responses/ErrorEnvelope"
        "409":
          $ref: "#/components/responses/ErrorEnvelope"

  /users/profile/avatar:
    post:
      tags: [auth]
      summary: Upload or replace current avatar
      operationId: uploadAvatar
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [account, session_token, avatar]
              properties:
                account:
                  type: string
                session_token:
                  type: string
                avatar:
                  type: string
                  format: binary
      responses:
        "200":
          description: Avatar uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeUploadAvatarResponse"
        "401":
          $ref: "#/components/responses/ErrorEnvelope"

  /users/online/session/start:
    post:
      tags: [presence]
      summary: Start online session and issue session token
      operationId: startOnlineSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnlineSessionStartRequest"
      responses:
        "200":
          description: Session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOnlineSession"

  /users/online/heartbeat:
    post:
      tags: [presence]
      summary: Heartbeat online session (requires session_token)
      operationId: heartbeatOnlineSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnlineHeartbeatRequest"
      responses:
        "200":
          description: Session renewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOnlineSession"
        "401":
          $ref: "#/components/responses/ErrorEnvelope"

  /users/online/status:
    get:
      tags: [presence]
      summary: Get current online status (requires session_token)
      operationId: getOnlineStatus
      parameters:
        - in: query
          name: account
          required: false
          schema:
            type: string
        - in: query
          name: username
          required: false
          schema:
            type: string
        - in: query
          name: session_token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Online status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOnlineStatus"
        "401":
          $ref: "#/components/responses/ErrorEnvelope"

  /users/online/logout:
    post:
      tags: [presence]
      summary: Logout online session (requires session_token)
      operationId: logoutOnlineSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnlineLogoutRequest"
      responses:
        "200":
          description: Logout success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeSuccessBool"
        "401":
          $ref: "#/components/responses/ErrorEnvelope"

  /files:
    get:
      tags: [catalog]
      summary: List music files
      operationId: listMusicFiles
      responses:
        "200":
          description: Music list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileListItem"

  /file:
    get:
      tags: [catalog]
      summary: List music files (compat alias)
      operationId: listMusicFilesCompat
      responses:
        "200":
          description: Music list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileListItem"

  /stream:
    post:
      tags: [catalog]
      summary: Get stream URL by filename
      operationId: getMusicStreamByFilename
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
            example:
              filename: hua_hai.mp3
      responses:
        "200":
          description: Music stream info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MusicResponse"
        "404":
          $ref: "#/components/responses/ErrorEnvelope"

  /get_music:
    get:
      tags: [catalog]
      summary: Get music detail by path
      operationId: getMusicByPath
      parameters:
        - in: query
          name: path
          required: true
          schema:
            type: string
          example: hua_hai/hua_hai.mp3
      responses:
        "200":
          description: Music detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MusicResponse"
        "404":
          $ref: "#/components/responses/ErrorEnvelope"

  /music/artist:
    post:
      tags: [catalog]
      summary: Search music by artist
      operationId: listMusicByArtist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArtistRequest"
            example:
              artist: Jay Chou
      responses:
        "200":
          description: Music list filtered by artist
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileListItem"

  /music/search:
    post:
      tags: [catalog]
      summary: Search music by keyword
      operationId: searchMusic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
            example:
              keyword: hai
      responses:
        "200":
          description: Music search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileListItem"

  /external/music/jamendo/search:
    post:
      tags: [catalog]
      summary: Search Jamendo external music library
      description: Real-time search against Jamendo. Results are not stored locally and stream_url points to Jamendo audio.
      operationId: searchJamendoMusic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExternalMusicSearchRequest"
            example:
              keyword: mayday
              limit: 20
      responses:
        "200":
          description: Jamendo external music results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExternalMusicTrack"
        "400":
          $ref: "#/components/responses/ErrorEnvelope"
        "502":
          $ref: "#/components/responses/ErrorEnvelope"
        "503":
          $ref: "#/components/responses/ErrorEnvelope"

  /external/music/jamendo/track:
    get:
      tags: [catalog]
      summary: Get Jamendo track detail
      description: Fetch one Jamendo track by Jamendo track id. This does not download or cache audio.
      operationId: getJamendoTrack
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: string
          example: "1218138"
      responses:
        "200":
          description: Jamendo external music detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalMusicTrack"
        "400":
          $ref: "#/components/responses/ErrorEnvelope"
        "404":
          $ref: "#/components/responses/ErrorEnvelope"
        "502":
          $ref: "#/components/responses/ErrorEnvelope"
        "503":
          $ref: "#/components/responses/ErrorEnvelope"

  /artist/search:
    post:
      tags: [catalog]
      summary: Check if artist exists
      operationId: searchArtist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArtistRequest"
            example:
              artist: Jay Chou
      responses:
        "200":
          description: Artist existence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtistExistsResponse"

  /user/favorites/add:
    post:
      tags: [profile]
      summary: Add favorite music
      operationId: addFavorite
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddFavoriteRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"
        "400":
          description: Missing user account or invalid body

  /user/favorites:
    get:
      tags: [profile]
      summary: List favorites
      operationId: listFavorites
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Favorite list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MusicItem"
        "400":
          description: Missing user account

  /user/favorites/remove:
    post:
      tags: [profile]
      summary: Remove favorite music
      operationId: removeFavorite
      description: user_account can be passed in query/header/body.
      parameters:
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: query
          name: music_path
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemoveFavoriteRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"
        "400":
          description: Missing parameters

  /user/history/add:
    post:
      tags: [profile]
      summary: Add play history record
      operationId: addPlayHistory
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPlayHistoryRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"
        "400":
          description: Missing user account or invalid body

  /user/history:
    get:
      tags: [profile]
      summary: List play history
      operationId: listPlayHistory
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
        - in: query
          name: distinct
          required: false
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Play history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MusicItem"

  /user/history/delete:
    post:
      tags: [profile]
      summary: Delete selected play history by music paths
      operationId: deletePlayHistory
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeletePlayHistoryRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteActionResponse"

  /user/history/clear:
    post:
      tags: [profile]
      summary: Clear all play history
      operationId: clearPlayHistory
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteActionResponse"

  /user/playlists:
    get:
      tags: [playlist]
      summary: List user playlists
      operationId: listPlaylists
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - in: query
          name: page_size
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Playlist page result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistListResponse"
    post:
      tags: [playlist]
      summary: Create private playlist
      operationId: createPlaylist
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlaylistRequest"
      responses:
        "200":
          description: Create success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistCreateResponse"

  /user/playlists/{playlist_id}:
    get:
      tags: [playlist]
      summary: Get playlist detail
      operationId: getPlaylistDetail
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: path
          name: playlist_id
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Playlist detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistDetail"

  /user/playlists/{playlist_id}/update:
    post:
      tags: [playlist]
      summary: Update playlist metadata
      operationId: updatePlaylist
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: path
          name: playlist_id
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlaylistRequest"
      responses:
        "200":
          description: Update success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /user/playlists/{playlist_id}/delete:
    post:
      tags: [playlist]
      summary: Delete playlist
      operationId: deletePlaylist
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: path
          name: playlist_id
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Delete success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /user/playlists/{playlist_id}/items/add:
    post:
      tags: [playlist]
      summary: Add tracks into playlist
      operationId: addPlaylistItems
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: path
          name: playlist_id
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPlaylistItemsRequest"
      responses:
        "200":
          description: Add result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistAddItemsResponse"

  /user/playlists/{playlist_id}/items/remove:
    post:
      tags: [playlist]
      summary: Remove tracks from playlist
      operationId: removePlaylistItems
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: path
          name: playlist_id
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemovePlaylistItemsRequest"
      responses:
        "200":
          description: Remove result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteActionResponse"

  /user/playlists/{playlist_id}/items/reorder:
    post:
      tags: [playlist]
      summary: Reorder playlist tracks
      operationId: reorderPlaylistItems
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: path
          name: playlist_id
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderPlaylistItemsRequest"
      responses:
        "200":
          description: Reorder success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /recommendations/audio:
    get:
      tags: [recommendation]
      summary: Get personalized audio recommendations
      operationId: getAudioRecommendations
      parameters:
        - in: query
          name: user_id
          required: false
          schema:
            type: string
          description: 推荐用户 ID；可替代使用 user_account / X-User-Account
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
        - in: query
          name: scene
          required: false
          schema:
            type: string
            enum: [home, radio, detail]
            default: home
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: exclude_played
          required: false
          schema:
            type: boolean
            default: true
        - in: query
          name: cursor
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Recommendation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeRecommendationList"
        "400":
          $ref: "#/components/responses/ErrorEnvelope"

  /recommendations/similar/{song_id}:
    get:
      tags: [recommendation]
      summary: Get similar songs by anchor song
      operationId: getSimilarRecommendations
      parameters:
        - in: path
          name: song_id
          required: true
          schema:
            type: string
          description: 建议使用 URL Path Encode 后传入
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Similar recommendation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeRecommendationList"
        "404":
          $ref: "#/components/responses/ErrorEnvelope"

  /recommendations/feedback:
    post:
      tags: [recommendation]
      summary: Report recommendation feedback
      operationId: postRecommendationFeedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationFeedbackRequest"
            example:
              user_id: "10001"
              song_id: "jay/七里香.mp3"
              event_type: "play"
              play_ms: 32000
              duration_ms: 240000
              scene: "home"
              request_id: "rec_abc123"
              model_version: "rule_hybrid_v1"
              event_at: "2026-03-04T10:00:00+08:00"
      responses:
        "200":
          description: Feedback accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeSuccessBool"
        "400":
          $ref: "#/components/responses/ErrorEnvelope"

  /admin/recommend/retrain:
    post:
      tags: [recommendation]
      summary: Trigger recommendation retrain task
      operationId: triggerRecommendationRetrain
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationRetrainRequest"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeTaskAccepted"

  /admin/recommend/model-status:
    get:
      tags: [recommendation]
      summary: Get recommendation model status
      operationId: getRecommendationModelStatus
      parameters:
        - in: query
          name: model_name
          required: false
          schema:
            type: string
            default: rule_hybrid
      responses:
        "200":
          description: Model status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeModelStatus"

  /upload:
    post:
      tags: [media]
      summary: Upload file
      operationId: uploadFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Upload success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeUploadPath"

  /files/{path}:
    get:
      tags: [media]
      summary: Download file by routed path
      operationId: downloadFileByPath
      description: If path contains '/', URL-encode it when calling this endpoint.
      parameters:
        - in: path
          name: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "206":
          description: Partial content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /download:
    get:
      tags: [media]
      summary: Download file by query parameter
      operationId: downloadFileByQuery
      parameters:
        - in: query
          name: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "206":
          description: Partial content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
    post:
      tags: [media]
      summary: Download file by POST payload
      operationId: downloadFileByPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DownloadPostRequest"
      responses:
        "200":
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "206":
          description: Partial content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /lrc:
    get:
      tags: [media]
      summary: Get lyric lines by lyric path
      operationId: getLyricsByPath
      parameters:
        - in: query
          name: path
          required: true
          schema:
            type: string
          example: hua_hai/hua_hai.lrc
      responses:
        "200":
          description: Lyric lines
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /uploads/{folder}/lrc:
    get:
      tags: [media]
      summary: Get lyric lines by music folder
      operationId: getLyricsByFolder
      parameters:
        - in: path
          name: folder
          required: true
          schema:
            type: string
          example: hua_hai
      responses:
        "200":
          description: Lyric lines
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /uploads/{path}:
    get:
      tags: [media]
      summary: Serve static media file (nginx direct)
      operationId: serveUploadedFile
      description: If path contains '/', URL-encode it when using generated clients.
      parameters:
        - in: path
          name: path
          required: true
          schema:
            type: string
        - in: header
          name: Range
          required: false
          schema:
            type: string
          example: bytes=0-1023
      responses:
        "200":
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "206":
          description: Partial content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /videos:
    get:
      tags: [video]
      summary: List videos
      operationId: listVideos
      responses:
        "200":
          description: Video list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VideoFile"

  /video/stream:
    post:
      tags: [video]
      summary: Get video stream URL
      operationId: getVideoStream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoStreamRequest"
      responses:
        "200":
          description: Video stream response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoStreamResponse"

  /video/{path}:
    get:
      tags: [video]
      summary: Serve static video file (nginx direct)
      operationId: serveVideoFile
      description: If path contains '/', URL-encode it when using generated clients.
      parameters:
        - in: path
          name: path
          required: true
          schema:
            type: string
        - in: header
          name: Range
          required: false
          schema:
            type: string
          example: bytes=0-1023
      responses:
        "200":
          description: Video content
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        "206":
          description: Partial video content
          content:
            video/mp4:
              schema:
                type: string
                format: binary

  /users/add_music:
    post:
      tags: [compatibility]
      summary: Add favorite in legacy monolith API
      operationId: addMusicLegacy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMusicRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeSuccessBool"
        "404":
          $ref: "#/components/responses/ErrorEnvelope"
        "500":
          $ref: "#/components/responses/ErrorEnvelope"

  /records:
    get:
      tags: [compatibility]
      summary: Legacy records endpoint
      operationId: getLegacyRecords
      responses:
        "200":
          description: Empty array
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /add:
    post:
      tags: [compatibility]
      summary: Legacy add endpoint
      operationId: postLegacyAdd
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeSuccessBool"

  /stats:
    get:
      tags: [system]
      summary: Basic runtime stats
      operationId: getStats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"

  /ack:
    get:
      tags: [compatibility]
      summary: Legacy ack endpoint
      operationId: getAck
      responses:
        "200":
          description: Empty body

  /:
    get:
      tags: [system]
      summary: Root welcome page
      operationId: getRootPage
      responses:
        "200":
          description: HTML page
          content:
            text/html:
              schema:
                type: string

components:
  responses:
    ErrorEnvelope:
      description: Error response envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    HealthResponse:
      type: object
      properties:
        database:
          type: boolean
        redis:
          type: boolean
        status:
          type: string
          example: ok
        timestamp:
          type: integer
          format: int64
      required: [database, redis, status, timestamp]

    EnvelopeClientPing:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: "#/components/schemas/ClientPingData"
      required: [code, message, data]

    ClientPingData:
      type: object
      properties:
        service:
          type: string
          example: cloudmusic-server
        status:
          type: string
          example: ok
        api_version:
          type: string
          example: "2026-03-03"
        timestamp:
          type: integer
          format: int64
        server_time:
          type: string
          example: "2026-03-03T10:00:00+08:00"
      required: [service, status, api_version, timestamp, server_time]

    EnvelopeClientBootstrap:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: "#/components/schemas/ClientBootstrapData"
      required: [code, message, data]

    ClientBootstrapData:
      type: object
      properties:
        service:
          type: string
          example: cloudmusic-server
        api_version:
          type: string
          example: "2026-03-03"
        ready:
          type: boolean
        timestamp:
          type: integer
          format: int64
        server_time:
          type: string
          example: "2026-03-03T10:00:00+08:00"
        public_base_url:
          type: string
          example: "http://127.0.0.1:8080"
        checks:
          type: object
          properties:
            database:
              type: boolean
            redis:
              type: boolean
          required: [database, redis]
        endpoints:
          type: object
          properties:
            ping:
              type: string
            bootstrap:
              type: string
            register:
              type: string
            login:
              type: string
          required: [ping, bootstrap, register, login]
      required: [service, api_version, ready, timestamp, server_time, public_base_url, checks, endpoints]

    StatsResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: "2.0"
        timestamp:
          type: integer
          format: int64
      required: [status, version, timestamp]

    ErrorEnvelope:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
      required: [code, message]

    EnvelopeSuccessBool:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            success:
              type: boolean
          required: [success]
      required: [code, message, data]

    EnvelopeUploadPath:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            filePath:
              type: string
      required: [code, message, data]

    RegisterRequest:
      type: object
      required: [account, password, username]
      properties:
        account:
          type: string
        password:
          type: string
        username:
          type: string

    LoginRequest:
      type: object
      required: [account, password]
      properties:
        account:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        success:
          type: string
          enum: ["true", "false"]
        success_bool:
          type: boolean
        username:
          type: string
        avatar_url:
          type: string
        song_path_list:
          type: array
          items:
            type: string
        online_session_token:
          type: string
        online_heartbeat_interval_sec:
          type: integer
        online_ttl_sec:
          type: integer
      required: [success, success_bool, username, song_path_list]

    UpdateUsernameRequest:
      type: object
      required: [account, session_token, username]
      properties:
        account:
          type: string
        session_token:
          type: string
        username:
          type: string

    EnvelopeUserProfile:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: "#/components/schemas/UserProfile"
      required: [code, message, data]

    UserProfile:
      type: object
      properties:
        account:
          type: string
        username:
          type: string
        avatar_url:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [account, username]

    EnvelopeUpdateUsernameResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: "#/components/schemas/UpdateUsernameResponse"
      required: [code, message, data]

    UpdateUsernameResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        username:
          type: string
      required: [success, message, username]

    EnvelopeUploadAvatarResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: "#/components/schemas/UploadAvatarResponse"
      required: [code, message, data]

    UploadAvatarResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        avatar_url:
          type: string
        avatar_path:
          type: string
      required: [success, message, avatar_url, avatar_path]

    UserPingRequest:
      type: object
      properties:
        account:
          type: string
        username:
          type: string

    OnlineSessionStartRequest:
      type: object
      properties:
        account:
          type: string
        username:
          type: string
        device_id:
          type: string

    OnlineHeartbeatRequest:
      type: object
      required: [session_token]
      properties:
        account:
          type: string
        username:
          type: string
        session_token:
          type: string
        device_id:
          type: string

    OnlineLogoutRequest:
      type: object
      required: [session_token]
      properties:
        account:
          type: string
        username:
          type: string
        session_token:
          type: string

    EnvelopeOnlineSession:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: "#/components/schemas/OnlineSessionResponse"
      required: [code, message, data]

    OnlineSessionResponse:
      type: object
      properties:
        account:
          type: string
        session_token:
          type: string
        heartbeat_interval_sec:
          type: integer
        online_ttl_sec:
          type: integer
        last_seen_at:
          type: integer
          format: int64
        expire_at:
          type: integer
          format: int64
      required: [account, session_token, heartbeat_interval_sec, online_ttl_sec, last_seen_at, expire_at]

    EnvelopeOnlineStatus:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: "#/components/schemas/OnlineStatusResponse"
      required: [code, message, data]

    OnlineStatusResponse:
      type: object
      properties:
        account:
          type: string
        online:
          type: boolean
        last_seen_at:
          type: integer
          format: int64
        ttl_remaining_sec:
          type: integer
          format: int64
        heartbeat_interval_sec:
          type: integer
        online_ttl_sec:
          type: integer
      required: [account, online, last_seen_at, ttl_remaining_sec, heartbeat_interval_sec, online_ttl_sec]

    EnvelopeRecommendationList:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: "#/components/schemas/RecommendationListData"
      required: [code, message, data]

    RecommendationListData:
      type: object
      properties:
        request_id:
          type: string
        user_id:
          type: string
        scene:
          type: string
        model_version:
          type: string
        next_cursor:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/RecommendationItem"
      required: [request_id, user_id, scene, model_version, items]

    RecommendationItem:
      type: object
      properties:
        song_id:
          type: string
        path:
          type: string
        title:
          type: string
        artist:
          type: string
        album:
          type: string
        duration_sec:
          type: number
          format: double
        cover_art_url:
          type: string
          nullable: true
        stream_url:
          type: string
        lrc_url:
          type: string
          nullable: true
        score:
          type: number
          format: double
        reason:
          type: string
        source:
          type: string
          enum: [cf, content, hot, hybrid]
      required: [song_id, path, title, artist, stream_url, score, reason, source]

    RecommendationFeedbackRequest:
      type: object
      required: [user_id, song_id, event_type]
      properties:
        user_id:
          type: string
        song_id:
          type: string
        event_type:
          type: string
          enum: [impression, click, play, finish, like, skip, share, dislike]
        play_ms:
          type: integer
          format: int64
        duration_ms:
          type: integer
          format: int64
        scene:
          type: string
          enum: [home, radio, detail]
        request_id:
          type: string
        model_version:
          type: string
        event_at:
          type: string
          format: date-time

    RecommendationRetrainRequest:
      type: object
      properties:
        model_name:
          type: string
          default: rule_hybrid
        force_full:
          type: boolean
          default: false

    EnvelopeTaskAccepted:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: accepted
        data:
          type: object
          properties:
            task_id:
              type: string
            status:
              type: string
              example: queued
          required: [task_id, status]
      required: [code, message, data]

    EnvelopeModelStatus:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: "#/components/schemas/RecommendationModelStatus"
      required: [code, message, data]

    RecommendationModelStatus:
      type: object
      properties:
        model_name:
          type: string
        model_version:
          type: string
        status:
          type: string
        trained_at:
          type: string
          format: date-time
          nullable: true
        metrics:
          type: object
          additionalProperties: true
      required: [model_name, model_version, status]

    AddMusicRequest:
      type: object
      required: [username, music_path]
      properties:
        username:
          type: string
        music_path:
          type: string

    StreamRequest:
      type: object
      required: [filename]
      properties:
        filename:
          type: string

    ArtistRequest:
      type: object
      required: [artist]
      properties:
        artist:
          type: string

    SearchRequest:
      type: object
      required: [keyword]
      properties:
        keyword:
          type: string

    ExternalMusicSearchRequest:
      type: object
      required: [keyword]
      properties:
        keyword:
          type: string
        limit:
          type: integer
          minimum: 1
          maximum: 200

    ExternalMusicTrack:
      type: object
      properties:
        source:
          type: string
          example: jamendo
        source_id:
          type: string
        title:
          type: string
        artist:
          type: string
        album:
          type: string
        duration_sec:
          type: number
          format: double
        stream_url:
          type: string
        cover_art_url:
          type: string
        lyrics:
          type: string
        license_url:
          type: string
        share_url:
          type: string
        download_allowed:
          type: boolean
        explicit:
          type: boolean
        lang:
          type: string
      required: [source, source_id, title, artist, stream_url, download_allowed, explicit]

    ArtistExistsResponse:
      type: object
      properties:
        exists:
          type: boolean
      required: [exists]

    FileListItem:
      type: object
      properties:
        path:
          type: string
        duration:
          type: string
        artist:
          type: string
        cover_art_url:
          type: string
          nullable: true
      required: [path, duration]

    MusicResponse:
      type: object
      properties:
        stream_url:
          type: string
        lrc_url:
          type: string
          nullable: true
        album_cover_url:
          type: string
          nullable: true
        duration:
          type: number
          format: double
          nullable: true
        title:
          type: string
        artist:
          type: string
        album:
          type: string
      required: [stream_url]

    AddFavoriteRequest:
      type: object
      required: [music_path]
      properties:
        music_path:
          type: string
        music_title:
          type: string
        artist:
          type: string
        duration_sec:
          type: number
          format: double
        is_local:
          type: boolean

    RemoveFavoriteRequest:
      type: object
      properties:
        user_account:
          type: string
        music_path:
          type: string

    AddPlayHistoryRequest:
      type: object
      required: [music_path]
      properties:
        music_path:
          type: string
        music_title:
          type: string
        artist:
          type: string
        album:
          type: string
        duration_sec:
          type: number
          format: double
        is_local:
          type: boolean

    DeletePlayHistoryRequest:
      type: object
      required: [music_paths]
      properties:
        music_paths:
          type: array
          items:
            type: string

    CreatePlaylistRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        cover_path:
          type: string

    UpdatePlaylistRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        cover_path:
          type: string

    PlaylistTrackInput:
      type: object
      required: [music_path, is_local]
      properties:
        music_path:
          type: string
        music_title:
          type: string
        artist:
          type: string
        album:
          type: string
        duration_sec:
          type: number
          format: double
        is_local:
          type: boolean
        cover_art_path:
          type: string

    AddPlaylistItemsRequest:
      type: object
