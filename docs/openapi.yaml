openapi: 3.0.3
info:
  title: Music Platform Gateway API
  version: "2026-05-07"
  description: |
    Gateway API for the split architecture deployment.
    Base gateway: http://127.0.0.1:8080
    Verified with live tests on 2026-03-04. Documentation metadata refreshed for VM client integration on 2026-05-07.
servers:
  - url: http://192.168.1.208:8080
    description: VM deployment gateway
  - url: http://127.0.0.1:8080
    description: Local gateway
  - url: http://slcdut.xyz:8080
    description: Public gateway

tags:
  - name: system
  - name: client
  - name: auth
  - name: presence
  - name: catalog
  - name: profile
  - name: playlist
  - name: comment
  - name: recommendation
  - name: media
  - name: video
  - name: compatibility

paths:
  /health:
    get:
      tags: [system]
      summary: Gateway health check
      operationId: getHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /client/ping:
    get:
      tags: [client]
      summary: Lightweight connectivity check for client startup
      operationId: getClientPing
      responses:
        "200":
          description: Ping success envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeClientPing"

  /client/bootstrap:
    get:
      tags: [client]
      summary: Client bootstrap info and service readiness
      operationId: getClientBootstrap
      responses:
        "200":
          description: Bootstrap success envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeClientBootstrap"

  /users/register:
    post:
      tags: [auth]
      summary: Register user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              account: demo_account
              password: demo_password
              username: demo_user
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeSuccessBool"
              example:
                code: 0
                message: success
                data:
                  success: true
        "409":
          description: Account already exists
          content:
            text/plain:
              schema:
                type: string
              example: this account already exists
        "400":
          $ref: "#/components/responses/ErrorEnvelope"

  /users/login:
    post:
      tags: [auth]
      summary: Login user
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              account: demo_account
              password: demo_password
      responses:
        "200":
          description: Login response (success or fail)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /users/ping:
    post:
      tags: [presence]
      summary: Legacy online ping (compat, no session token check)
      operationId: pingUserLegacy
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPingRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeSuccessBool"

  /users/profile:
    get:
      tags: [auth]
      summary: Get current user profile
      operationId: getUserProfile
      parameters:
        - in: query
          name: account
          required: true
          schema:
            type: string
        - in: query
          name: session_token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeUserProfile"
        "401":
          $ref: "#/components/responses/ErrorEnvelope"

  /users/profile/username:
    post:
      tags: [auth]
      summary: Update current username
      operationId: updateUsername
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUsernameRequest"
            example:
              account: demo_account
              session_token: demo_session_token
              username: 新用户名
      responses:
        "200":
          description: Username updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeUpdateUsernameResponse"
        "401":
          $ref: "#/components/responses/ErrorEnvelope"
        "409":
          $ref: "#/components/responses/ErrorEnvelope"

  /users/profile/avatar:
    post:
      tags: [auth]
      summary: Upload or replace current avatar
      operationId: uploadAvatar
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [account, session_token, avatar]
              properties:
                account:
                  type: string
                session_token:
                  type: string
                avatar:
                  type: string
                  format: binary
      responses:
        "200":
          description: Avatar uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeUploadAvatarResponse"
        "401":
          $ref: "#/components/responses/ErrorEnvelope"

  /users/online/session/start:
    post:
      tags: [presence]
      summary: Start online session and issue session token
      operationId: startOnlineSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnlineSessionStartRequest"
      responses:
        "200":
          description: Session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOnlineSession"

  /users/online/heartbeat:
    post:
      tags: [presence]
      summary: Heartbeat online session (requires session_token)
      operationId: heartbeatOnlineSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnlineHeartbeatRequest"
      responses:
        "200":
          description: Session renewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOnlineSession"
        "401":
          $ref: "#/components/responses/ErrorEnvelope"

  /users/online/status:
    get:
      tags: [presence]
      summary: Get current online status (requires session_token)
      operationId: getOnlineStatus
      parameters:
        - in: query
          name: account
          required: false
          schema:
            type: string
        - in: query
          name: username
          required: false
          schema:
            type: string
        - in: query
          name: session_token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Online status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOnlineStatus"
        "401":
          $ref: "#/components/responses/ErrorEnvelope"

  /users/online/logout:
    post:
      tags: [presence]
      summary: Logout online session (requires session_token)
      operationId: logoutOnlineSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnlineLogoutRequest"
      responses:
        "200":
          description: Logout success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeSuccessBool"
        "401":
          $ref: "#/components/responses/ErrorEnvelope"

  /files:
    get:
      tags: [catalog]
      summary: List music files
      operationId: listMusicFiles
      responses:
        "200":
          description: Music list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileListItem"

  /file:
    get:
      tags: [catalog]
      summary: List music files (compat alias)
      operationId: listMusicFilesCompat
      responses:
        "200":
          description: Music list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileListItem"

  /stream:
    post:
      tags: [catalog]
      summary: Get stream URL by filename
      description: Supports both local catalog filenames and Jamendo-compatible virtual filenames returned by `/music/search`.
      operationId: getMusicStreamByFilename
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
            example:
              filename: hua_hai.mp3
      responses:
        "200":
          description: Music stream info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MusicResponse"
        "404":
          $ref: "#/components/responses/ErrorEnvelope"

  /get_music:
    get:
      tags: [catalog]
      summary: Get music detail by path
      operationId: getMusicByPath
      parameters:
        - in: query
          name: path
          required: true
          schema:
            type: string
          example: hua_hai/hua_hai.mp3
      responses:
        "200":
          description: Music detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MusicResponse"
        "404":
          $ref: "#/components/responses/ErrorEnvelope"

  /music/artist:
    post:
      tags: [catalog]
      summary: Search music by artist
      operationId: listMusicByArtist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArtistRequest"
            example:
              artist: Jay Chou
      responses:
        "200":
          description: Music list filtered by artist
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileListItem"

  /music/search:
    post:
      tags: [catalog]
      summary: Search music by keyword
      description: |
        Uses keyword-based routing while keeping the legacy response schema.
        If the keyword contains Chinese characters, local catalog search is tried first and Jamendo is used as fallback.
        If the keyword contains Latin letters and no Chinese characters, Jamendo is tried first and local catalog search is used as fallback.
        Jamendo results are mapped into `FileListItem` with a virtual `path` that can be sent back to `/stream` and `/download`.
      operationId: searchMusic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
            example:
              keyword: hai
      responses:
        "200":
          description: Music search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileListItem"

  /external/music/jamendo/search:
    post:
      tags: [catalog]
      summary: Search Jamendo external music library
      description: Real-time search against Jamendo. Results are not stored locally and stream_url points to Jamendo audio.
      operationId: searchJamendoMusic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExternalMusicSearchRequest"
            example:
              keyword: mayday
              limit: 20
      responses:
        "200":
          description: Jamendo external music results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExternalMusicTrack"
        "400":
          $ref: "#/components/responses/ErrorEnvelope"
        "502":
          $ref: "#/components/responses/ErrorEnvelope"
        "503":
          $ref: "#/components/responses/ErrorEnvelope"

  /external/music/jamendo/track:
    get:
      tags: [catalog]
      summary: Get Jamendo track detail
      description: Fetch one Jamendo track by Jamendo track id. This does not download or cache audio.
      operationId: getJamendoTrack
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: string
          example: "1218138"
      responses:
        "200":
          description: Jamendo external music detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalMusicTrack"
        "400":
          $ref: "#/components/responses/ErrorEnvelope"
        "404":
          $ref: "#/components/responses/ErrorEnvelope"
        "502":
          $ref: "#/components/responses/ErrorEnvelope"
        "503":
          $ref: "#/components/responses/ErrorEnvelope"

  /artist/search:
    post:
      tags: [catalog]
      summary: Check if artist exists
      operationId: searchArtist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArtistRequest"
            example:
              artist: Jay Chou
      responses:
        "200":
          description: Artist existence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtistExistsResponse"

  /user/favorites/add:
    post:
      tags: [profile]
      summary: Add favorite music
      operationId: addFavorite
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddFavoriteRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"
        "400":
          description: Missing user account or invalid body

  /user/favorites:
    get:
      tags: [profile]
      summary: List favorites
      operationId: listFavorites
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Favorite list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MusicItem"
        "400":
          description: Missing user account

  /user/favorites/remove:
    post:
      tags: [profile]
      summary: Remove favorite music
      operationId: removeFavorite
      description: user_account can be passed in query/header/body.
      parameters:
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: query
          name: music_path
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemoveFavoriteRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"
        "400":
          description: Missing parameters

  /user/history/add:
    post:
      tags: [profile]
      summary: Add play history record
      operationId: addPlayHistory
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPlayHistoryRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"
        "400":
          description: Missing user account or invalid body

  /user/history:
    get:
      tags: [profile]
      summary: List play history
      operationId: listPlayHistory
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
        - in: query
          name: distinct
          required: false
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Play history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MusicItem"

  /user/history/delete:
    post:
      tags: [profile]
      summary: Delete selected play history by music paths
      operationId: deletePlayHistory
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeletePlayHistoryRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteActionResponse"

  /user/history/clear:
    post:
      tags: [profile]
      summary: Clear all play history
      operationId: clearPlayHistory
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteActionResponse"

  /user/playlists:
    get:
      tags: [playlist]
      summary: List user playlists
      operationId: listPlaylists
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - in: query
          name: page_size
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Playlist page result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistListResponse"
    post:
      tags: [playlist]
      summary: Create private playlist
      operationId: createPlaylist
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlaylistRequest"
      responses:
        "200":
          description: Create success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistCreateResponse"

  /user/playlists/{playlist_id}:
    get:
      tags: [playlist]
      summary: Get playlist detail
      operationId: getPlaylistDetail
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: path
          name: playlist_id
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Playlist detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistDetail"

  /user/playlists/{playlist_id}/update:
    post:
      tags: [playlist]
      summary: Update playlist metadata
      operationId: updatePlaylist
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: path
          name: playlist_id
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlaylistRequest"
      responses:
        "200":
          description: Update success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /user/playlists/{playlist_id}/delete:
    post:
      tags: [playlist]
      summary: Delete playlist
      operationId: deletePlaylist
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: path
          name: playlist_id
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Delete success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /user/playlists/{playlist_id}/items/add:
    post:
      tags: [playlist]
      summary: Add tracks into playlist
      operationId: addPlaylistItems
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: path
          name: playlist_id
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPlaylistItemsRequest"
      responses:
        "200":
          description: Add result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistAddItemsResponse"

  /user/playlists/{playlist_id}/items/remove:
    post:
      tags: [playlist]
      summary: Remove tracks from playlist
      operationId: removePlaylistItems
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: path
          name: playlist_id
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemovePlaylistItemsRequest"
      responses:
        "200":
          description: Remove result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteActionResponse"

  /user/playlists/{playlist_id}/items/reorder:
    post:
      tags: [playlist]
      summary: Reorder playlist tracks
      operationId: reorderPlaylistItems
      description: Provide user identity with query param user_account or header X-User-Account.
      parameters:
        - in: path
          name: playlist_id
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: user_account
          required: false
          schema:
            type: string
        - in: header
          name: X-User-Account
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderPlaylistItemsRequest"
      responses:
        "200":
          description: Reorder success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /music/comments:
    get:
      tags: [comment]
      summary: List root comments for one online track
      operationId: listMusicComments
      parameters:
        - in: query
          name: music_path
          required: true
          schema:
            type: string
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - in: query
          name: page_size
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Comment thread with root comments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentThreadResponse"
        "400":
          $ref: "#/components/responses/ErrorEnvelope"
    post:
