components:
  responses:
    ErrorEnvelope:
      description: Error response envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    HealthResponse:
      type: object
      properties:
        database:
          type: boolean
        redis:
          type: boolean
        status:
          type: string
          example: ok
        timestamp:
          type: integer
          format: int64
      required: [database, redis, status, timestamp]

    EnvelopeClientPing:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: "#/components/schemas/ClientPingData"
      required: [code, message, data]

    ClientPingData:
      type: object
      properties:
        service:
          type: string
          example: cloudmusic-server
        status:
          type: string
          example: ok
        api_version:
          type: string
          example: "2026-03-03"
        timestamp:
          type: integer
          format: int64
        server_time:
          type: string
          example: "2026-03-03T10:00:00+08:00"
      required: [service, status, api_version, timestamp, server_time]

    EnvelopeClientBootstrap:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: "#/components/schemas/ClientBootstrapData"
      required: [code, message, data]

    ClientBootstrapData:
      type: object
      properties:
        service:
          type: string
          example: cloudmusic-server
        api_version:
          type: string
          example: "2026-03-03"
        ready:
          type: boolean
        timestamp:
          type: integer
          format: int64
        server_time:
          type: string
          example: "2026-03-03T10:00:00+08:00"
        public_base_url:
          type: string
          example: "http://127.0.0.1:8080"
        checks:
          type: object
          properties:
            database:
              type: boolean
            redis:
              type: boolean
          required: [database, redis]
        endpoints:
          type: object
          properties:
            ping:
              type: string
            bootstrap:
              type: string
            register:
              type: string
            login:
              type: string
          required: [ping, bootstrap, register, login]
      required: [service, api_version, ready, timestamp, server_time, public_base_url, checks, endpoints]

    StatsResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: "2.0"
        timestamp:
          type: integer
          format: int64
      required: [status, version, timestamp]

    ErrorEnvelope:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
      required: [code, message]

    EnvelopeSuccessBool:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            success:
              type: boolean
          required: [success]
      required: [code, message, data]

    EnvelopeUploadPath:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            filePath:
              type: string
      required: [code, message, data]

    RegisterRequest:
      type: object
      required: [account, password, username]
      properties:
        account:
          type: string
        password:
          type: string
        username:
          type: string

    LoginRequest:
      type: object
      required: [account, password]
      properties:
        account:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        success:
          type: string
          enum: ["true", "false"]
        success_bool:
          type: boolean
        username:
          type: string
        avatar_url:
          type: string
        song_path_list:
          type: array
          items:
            type: string
        online_session_token:
          type: string
        online_heartbeat_interval_sec:
          type: integer
        online_ttl_sec:
          type: integer
      required: [success, success_bool, username, song_path_list]

    UpdateUsernameRequest:
      type: object
      required: [account, session_token, username]
      properties:
        account:
          type: string
        session_token:
          type: string
        username:
          type: string

    EnvelopeUserProfile:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: "#/components/schemas/UserProfile"
      required: [code, message, data]

    UserProfile:
      type: object
      properties:
        account:
          type: string
        username:
          type: string
        avatar_url:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [account, username]

    EnvelopeUpdateUsernameResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: "#/components/schemas/UpdateUsernameResponse"
      required: [code, message, data]

    UpdateUsernameResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        username:
          type: string
      required: [success, message, username]

    EnvelopeUploadAvatarResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: "#/components/schemas/UploadAvatarResponse"
      required: [code, message, data]

    UploadAvatarResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        avatar_url:
          type: string
        avatar_path:
          type: string
      required: [success, message, avatar_url, avatar_path]

    UserPingRequest:
      type: object
      properties:
        account:
          type: string
        username:
          type: string

    OnlineSessionStartRequest:
      type: object
      properties:
        account:
          type: string
        username:
          type: string
        device_id:
          type: string

    OnlineHeartbeatRequest:
      type: object
      required: [session_token]
      properties:
        account:
          type: string
        username:
          type: string
        session_token:
          type: string
        device_id:
          type: string

    OnlineLogoutRequest:
      type: object
      required: [session_token]
      properties:
        account:
          type: string
        username:
          type: string
        session_token:
          type: string

    EnvelopeOnlineSession:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: "#/components/schemas/OnlineSessionResponse"
      required: [code, message, data]

    OnlineSessionResponse:
      type: object
