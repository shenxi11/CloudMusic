  /music/charts/hot:
    get:
      tags: [profile]
      summary: Get online hot songs chart
      operationId: getHotMusicChart
      description: |
        Returns the public hot chart for online music only.
        Rankings are served from the Redis leaderboard, where every successful online play-history write
        increments both the all-time leaderboard and the current daily bucket.
        The default window is the most recent 30 days and the default limit is 20.
      parameters:
        - in: query
          name: window
          required: false
          schema:
            type: string
            enum: [7d, 30d, all]
            default: 30d
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Hot chart result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HotChartResponse"
        "503":
          description: Leaderboard unavailable because Redis is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/charts/hot/rebuild:
    post:
      tags: [profile, admin]
      summary: Rebuild Redis-backed online hot chart
      operationId: rebuildHotMusicChart
      description: |
        Rebuilds the Redis leaderboard from MySQL play-history records.
        Use `window=all` to rebuild the all-time leaderboard, or `window=7d|30d`
        to rebuild the recent daily buckets.
      parameters:
        - in: query
          name: window
          required: true
          schema:
            type: string
            enum: [7d, 30d, all]
      responses:
        "200":
          description: Rebuild success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeHotChartRebuildResponse"
        "400":
          description: Invalid rebuild window
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Leaderboard unavailable because Redis is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
